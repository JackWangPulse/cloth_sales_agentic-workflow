<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导购助手工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f4efe7;
            --border: #e5d9c7;
            --ink: #1f2937;
        }

        body {
            background:
                radial-gradient(circle at top right, rgba(245, 158, 11, 0.18), transparent 28%),
                linear-gradient(180deg, #f8f4ec 0%, var(--bg) 55%, #efe6da 100%);
            color: var(--ink);
            font-family: "IBM Plex Sans", "Noto Sans SC", "Segoe UI", sans-serif;
        }

        .panel {
            background: linear-gradient(180deg, rgba(255, 253, 249, 0.98), rgba(255, 252, 246, 0.96));
            border: 1px solid var(--border);
            box-shadow: 0 16px 40px rgba(72, 52, 25, 0.08);
        }

        .json-box {
            background: #111827;
            color: #d1fae5;
            font-family: "IBM Plex Mono", "Cascadia Code", monospace;
        }

        .route-vector {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .route-sales {
            background: #ecfccb;
            color: #4d7c0f;
        }

        .route-unknown {
            background: #f3f4f6;
            color: #4b5563;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 999px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <header class="mb-6">
            <div class="panel rounded-[28px] p-6 sm:p-8">
                <div class="flex flex-col gap-6 lg:flex-row lg:items-end lg:justify-between">
                    <div>
                        <div class="mb-3 inline-flex items-center gap-2 rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-semibold uppercase tracking-[0.2em] text-amber-700">
                            Guide Assistant
                        </div>
                        <h1 class="text-3xl font-semibold sm:text-4xl">导购助手工作台</h1>
                        <p class="mt-3 max-w-3xl text-sm leading-6 text-slate-600 sm:text-base">
                            这个页面只调用 <code class="rounded bg-amber-50 px-2 py-1 text-amber-800">POST /ai/guide/assistant</code>。
                            你可以直接做两类操作：一类是搜款并查看推荐文案，另一类是输入用户、商品和导购信息获取跟进建议。
                        </p>
                    </div>
                    <div class="grid gap-3 sm:grid-cols-3">
                        <div class="rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3">
                            <p class="text-xs uppercase tracking-[0.16em] text-amber-700">后端地址</p>
                            <p class="mt-1 text-sm font-semibold text-amber-900">http://127.0.0.1:8000</p>
                        </div>
                        <button type="button" onclick="fillSearchExample()" class="rounded-2xl border border-sky-200 bg-sky-50 px-4 py-3 text-left transition hover:bg-sky-100">
                            <p class="text-xs uppercase tracking-[0.16em] text-sky-700">示例一</p>
                            <p class="mt-1 text-sm font-semibold text-sky-900">搜索通勤外套</p>
                        </button>
                        <button type="button" onclick="fillFollowupExample()" class="rounded-2xl border border-lime-200 bg-lime-50 px-4 py-3 text-left transition hover:bg-lime-100">
                            <p class="text-xs uppercase tracking-[0.16em] text-lime-700">示例二</p>
                            <p class="mt-1 text-sm font-semibold text-lime-900">生成跟进建议</p>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div id="errorBanner" class="mb-5 hidden rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

        <main class="grid gap-6 lg:grid-cols-[minmax(320px,420px),1fr]">
            <section class="panel rounded-[28px] p-6">
                <div class="mb-6 flex items-center justify-between">
                    <div>
                        <h2 class="text-xl font-semibold">请求参数</h2>
                        <p class="mt-1 text-sm text-slate-500">填写自然语言需求和可选结构化字段，然后直接执行统一入口。</p>
                    </div>
                    <button type="button" onclick="clearForm()" class="rounded-full border border-stone-300 px-3 py-1 text-sm text-stone-600 transition hover:bg-stone-100">
                        清空
                    </button>
                </div>

                <div class="space-y-4">
                    <div>
                        <label for="query" class="mb-2 block text-sm font-medium">自然语言需求</label>
                        <textarea id="query" rows="4" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="例如：帮我找几款通勤外套；这个用户看了这款商品很久，我该怎么回"></textarea>
                    </div>

                    <div class="grid gap-4 sm:grid-cols-2">
                        <div>
                            <label for="guideId" class="mb-2 block text-sm font-medium">导购 ID</label>
                            <input id="guideId" type="text" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="guide_001">
                        </div>
                        <div>
                            <label for="topK" class="mb-2 block text-sm font-medium">检索数量</label>
                            <input id="topK" type="number" min="1" max="20" value="5" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200">
                        </div>
                    </div>

                    <div class="grid gap-4 sm:grid-cols-2">
                        <div>
                            <label for="userId" class="mb-2 block text-sm font-medium">用户 ID</label>
                            <input id="userId" type="text" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="user_001">
                        </div>
                        <div>
                            <label for="sku" class="mb-2 block text-sm font-medium">商品 SKU</label>
                            <input id="sku" type="text" class="w-full rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm outline-none transition focus:border-amber-500 focus:ring-2 focus:ring-amber-200" placeholder="8WZ01CM1">
                        </div>
                    </div>

                    <label class="flex items-center gap-3 rounded-2xl border border-stone-300 bg-white px-4 py-3 text-sm">
                        <input id="useCustomPlan" type="checkbox" class="h-4 w-4 rounded border-stone-400 text-amber-600 focus:ring-amber-500">
                        <span>跟进建议使用自定义执行计划</span>
                    </label>

                    <button id="submitButton" type="button" onclick="submitGuideAssistant()" class="inline-flex w-full items-center justify-center gap-3 rounded-2xl bg-amber-700 px-5 py-4 text-sm font-semibold text-white transition hover:bg-amber-800 disabled:cursor-not-allowed disabled:opacity-70">
                        <span id="submitLabel">执行导购助手</span>
                        <span id="submitSpinner" class="spinner hidden"></span>
                    </button>
                </div>
            </section>

            <section class="space-y-6">
                <div class="panel rounded-[28px] p-6">
                    <div class="mb-5 flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-semibold">执行结果</h2>
                            <p class="mt-1 text-sm text-slate-500">优先展示可直接使用的结果，底部再保留原始 JSON。</p>
                        </div>
                        <div id="routeBadge" class="hidden rounded-full px-3 py-1 text-xs font-semibold tracking-[0.14em] uppercase"></div>
                    </div>

                    <div id="resultEmpty" class="rounded-3xl border border-dashed border-stone-300 bg-white/70 px-6 py-12 text-center">
                        <p class="text-sm text-slate-500">还没有结果。填好参数后点击“执行导购助手”即可。</p>
                    </div>

                    <div id="resultContent" class="hidden space-y-5">
                        <div class="grid gap-4 lg:grid-cols-[minmax(260px,320px),1fr]">
                            <div class="rounded-3xl border border-stone-200 bg-white p-4">
                                <p class="text-xs uppercase tracking-[0.14em] text-stone-500">路由说明</p>
                                <p id="routeReason" class="mt-2 text-sm leading-6 text-stone-700"></p>
                            </div>
                            <div class="rounded-3xl border border-stone-200 bg-white p-4">
                                <p class="mb-3 text-xs uppercase tracking-[0.14em] text-stone-500">标准化参数</p>
                                <div id="normalizedParams" class="grid gap-2 sm:grid-cols-2"></div>
                            </div>
                        </div>

                        <div id="diagnosticsCard" class="rounded-3xl border border-stone-200 bg-white p-5"></div>
                        <div id="routeSpecificContent"></div>
                    </div>
                </div>

                <div class="panel rounded-[28px] p-6">
                    <div class="mb-4 flex items-center justify-between">
                        <div>
                            <h2 class="text-xl font-semibold">原始 JSON</h2>
                            <p class="mt-1 text-sm text-slate-500">保留接口原始返回，便于调试和核对。</p>
                        </div>
                        <button type="button" onclick="copyJson()" class="rounded-full border border-emerald-300 bg-emerald-50 px-4 py-2 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100">
                            复制 JSON
                        </button>
                    </div>
                    <pre id="rawJson" class="json-box min-h-[240px] overflow-x-auto rounded-3xl p-4 text-xs leading-6">等待执行结果...</pre>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let latestPayload = null;

        function showError(message) {
            const banner = document.getElementById("errorBanner");
            banner.textContent = message;
            banner.classList.remove("hidden");
        }

        function hideError() {
            document.getElementById("errorBanner").classList.add("hidden");
        }

        function setLoading(isLoading) {
            const button = document.getElementById("submitButton");
            document.getElementById("submitLabel").textContent = isLoading ? "执行中..." : "执行导购助手";
            document.getElementById("submitSpinner").classList.toggle("hidden", !isLoading);
            button.disabled = isLoading;
        }

        function fillSearchExample() {
            document.getElementById("query").value = "帮我找几款通勤外套";
            document.getElementById("guideId").value = "guide_001";
            document.getElementById("userId").value = "";
            document.getElementById("sku").value = "";
            document.getElementById("topK").value = "5";
            document.getElementById("useCustomPlan").checked = false;
        }

        function fillFollowupExample() {
            document.getElementById("query").value = "这个用户看了这款商品很久，我该怎么回";
            document.getElementById("guideId").value = "guide_001";
            document.getElementById("userId").value = "user_001";
            document.getElementById("sku").value = "8WZ01CM1";
            document.getElementById("topK").value = "5";
            document.getElementById("useCustomPlan").checked = true;
        }

        function clearForm() {
            document.getElementById("query").value = "";
            document.getElementById("guideId").value = "";
            document.getElementById("userId").value = "";
            document.getElementById("sku").value = "";
            document.getElementById("topK").value = "5";
            document.getElementById("useCustomPlan").checked = false;
            hideError();
        }

        function getPayloadFromForm() {
            return {
                query: document.getElementById("query").value.trim(),
                guide_id: document.getElementById("guideId").value.trim() || null,
                user_id: document.getElementById("userId").value.trim() || null,
                sku: document.getElementById("sku").value.trim() || null,
                top_k: Number.parseInt(document.getElementById("topK").value, 10) || 5,
                use_custom_plan: document.getElementById("useCustomPlan").checked
            };
        }

        async function submitGuideAssistant() {
            hideError();

            const payload = getPayloadFromForm();
            if (!payload.query) {
                showError("query 不能为空");
                return;
            }

            if ((payload.user_id || payload.sku) && !payload.guide_id) {
                showError("当填写 user_id 或 sku 时，guide_id 也必须填写。");
                return;
            }

            if (payload.top_k < 1 || payload.top_k > 20) {
                showError("top_k 必须在 1 到 20 之间。");
                return;
            }

            setLoading(true);

            try {
                const response = await fetch(`${API_BASE}/ai/guide/assistant`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                let json;
                try {
                    json = await response.json();
                } catch (error) {
                    throw new Error("后端返回的不是合法 JSON");
                }

                if (!response.ok) {
                    const detail = typeof json.detail === "string" ? json.detail : JSON.stringify(json.detail || json);
                    throw new Error(detail || `HTTP ${response.status}`);
                }

                if (!json || !json.data) {
                    throw new Error("响应缺少 data 字段");
                }

                latestPayload = json;
                renderGuideAssistantResult(json.data);
                renderRawJson(json);
            } catch (error) {
                showError(`请求失败：${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        function renderGuideAssistantResult(data) {
            document.getElementById("resultEmpty").classList.add("hidden");
            document.getElementById("resultContent").classList.remove("hidden");

            const routeBadge = document.getElementById("routeBadge");
            routeBadge.classList.remove("hidden", "route-vector", "route-sales", "route-unknown");
            routeBadge.textContent = getRouteDisplayName(data.route_name);

            if (data.route_name === "vector_search") {
                routeBadge.classList.add("route-vector");
            } else if (data.route_name === "sales_graph") {
                routeBadge.classList.add("route-sales");
            } else {
                routeBadge.classList.add("route-unknown");
            }

            document.getElementById("routeReason").textContent = data.reason || "-";
            renderNormalizedParams(data.normalized_params || {});
            renderDiagnostics(data.diagnostics || {});

            if (data.route_name === "vector_search") {
                renderVectorSearchResult(data.result || {});
            } else if (data.route_name === "sales_graph") {
                renderSalesGraphResult(data.result || {});
            } else {
                renderUnknownResult();
            }
        }

        function renderNormalizedParams(params) {
            const target = document.getElementById("normalizedParams");
            const entries = Object.entries(params);

            if (entries.length === 0) {
                target.innerHTML = '<p class="text-sm text-stone-500">没有标准化参数</p>';
                return;
            }

            target.innerHTML = entries.map(([key, value]) => `
                <div class="rounded-2xl border border-stone-200 bg-stone-50 px-3 py-3">
                    <p class="text-xs uppercase tracking-[0.14em] text-stone-500">${escapeHtml(key)}</p>
                    <p class="mt-1 break-all text-sm text-stone-800">${escapeHtml(formatValue(value))}</p>
                </div>
            `).join("");
        }

        function renderDiagnostics(diagnostics) {
            const cacheDiagnostics = diagnostics.cache_diagnostics || {};
            const entries = Object.entries(cacheDiagnostics);
            const rows = entries.length ? entries.map(([key, value]) => `
                <div class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3">
                    <p class="text-xs uppercase tracking-[0.14em] text-stone-500">${escapeHtml(key)}</p>
                    <p class="mt-2 text-sm font-medium text-stone-800">${escapeHtml(formatValue(value))}</p>
                </div>
            `).join("") : '<div class="rounded-2xl border border-dashed border-stone-300 px-4 py-6 text-center text-sm text-stone-500">没有缓存诊断信息</div>';

            document.getElementById("diagnosticsCard").innerHTML = `
                <div class="mb-4 flex items-center justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-[0.14em] text-stone-500">性能诊断</p>
                        <h3 class="mt-1 text-lg font-semibold">接口耗时与缓存状态</h3>
                    </div>
                    <span class="rounded-full bg-stone-100 px-3 py-1 text-xs font-semibold text-stone-700">${escapeHtml(getRouteDisplayName(diagnostics.route_name))}</span>
                </div>
                <div class="grid gap-3 lg:grid-cols-4">
                    ${makeStatCard("总耗时 ms", diagnostics.total_duration_ms ?? "-")}
                    ${makeStatCard("LLM 耗时 ms", diagnostics.llm_duration_ms ?? "-")}
                    ${makeStatCard("非 LLM 耗时 ms", diagnostics.non_llm_duration_ms ?? "-")}
                    ${makeStatCard("下游耗时 ms", diagnostics.downstream_duration_ms ?? "-")}
                </div>
                <div class="mt-4 grid gap-3 md:grid-cols-2 xl:grid-cols-3">
                    ${rows}
                </div>
            `;
        }

        function renderVectorSearchResult(result) {
            const items = Array.isArray(result.results) ? result.results : [];
            const cards = items.map(item => {
                const copyCandidates = Array.isArray(item.copy_candidates) ? item.copy_candidates : [];
                const topCopy = copyCandidates[0] || null;
                const extraCopies = copyCandidates.slice(1);

                const topCopyBlock = topCopy ? `
                    <div class="mb-4 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-4">
                        <p class="text-xs uppercase tracking-[0.14em] text-emerald-700">首条推荐文案</p>
                        <p class="mt-2 text-sm leading-7 text-slate-800">${escapeHtml(topCopy.message || "")}</p>
                    </div>
                ` : "";

                const extraCopyBlock = extraCopies.length ? `
                    <div class="mt-4 rounded-2xl border border-emerald-100 bg-white p-4">
                        <p class="text-xs uppercase tracking-[0.14em] text-emerald-700">更多推荐文案</p>
                        <div class="mt-3 space-y-2">
                            ${extraCopies.map(candidate => `
                                <div class="rounded-2xl border border-emerald-100 bg-emerald-50 px-3 py-3">
                                    <p class="text-sm leading-6 text-slate-700">${escapeHtml(candidate.message || "")}</p>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                ` : "";

                const productMeta = item.sku || item.product_name ? `
                    <div class="mb-3 flex flex-wrap gap-2">
                        ${item.sku ? `<span class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-sky-700">SKU ${escapeHtml(String(item.sku))}</span>` : ""}
                        ${item.product_name ? `<span class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-700">${escapeHtml(String(item.product_name))}</span>` : ""}
                    </div>
                ` : "";

                return `
                    <article class="rounded-3xl border border-sky-100 bg-sky-50/70 p-4">
                        <div class="mb-3 flex items-center justify-between">
                            <span class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-sky-700">#${escapeHtml(String(item.rank || "-"))}</span>
                            <span class="text-xs font-medium text-sky-800">score ${escapeHtml(String(item.score ?? "-"))}</span>
                        </div>
                        ${productMeta}
                        ${topCopyBlock}
                        <div class="rounded-2xl border border-sky-100 bg-white px-4 py-4">
                            <p class="text-xs uppercase tracking-[0.14em] text-sky-700">检索片段</p>
                            <p class="mt-2 text-sm leading-6 text-slate-700">${escapeHtml(item.chunk || "")}</p>
                        </div>
                        ${extraCopyBlock}
                    </article>
                `;
            }).join("");

            document.getElementById("routeSpecificContent").innerHTML = `
                <section class="rounded-3xl border border-sky-100 bg-white p-5">
                    <div class="mb-4 flex items-center justify-between">
                        <div>
                            <p class="text-xs uppercase tracking-[0.14em] text-sky-700">搜索结果</p>
                            <h3 class="mt-1 text-lg font-semibold">找到的商品与推荐文案</h3>
                        </div>
                        <div class="rounded-2xl bg-sky-50 px-4 py-2 text-sm font-medium text-sky-800">
                            共 ${escapeHtml(String(result.total ?? items.length))} 条
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${cards || '<div class="rounded-2xl border border-dashed border-sky-200 px-4 py-8 text-center text-sm text-sky-700">没有检索结果</div>'}
                    </div>
                </section>
            `;
        }

        function renderSalesGraphResult(result) {
            const suggestion = result.sales_suggestion || null;
            const messagePack = Array.isArray(suggestion?.message_pack) ? suggestion.message_pack : [];
            const secondaryMessages = messagePack.filter(item => item.type !== "primary");
            const playbook = Array.isArray(suggestion?.followup_playbook) ? suggestion.followup_playbook : [];

            const stats = [
                makeStatCard("意图等级", result.intent_level || "-"),
                makeStatCard("允许触达", String(result.allowed ?? false)),
                makeStatCard("防打扰拦截", String(result.anti_disturb_blocked ?? false)),
                makeStatCard("执行节点数", Array.isArray(result.plan_used) ? result.plan_used.length : 0)
            ].join("");

            document.getElementById("routeSpecificContent").innerHTML = `
                <section class="space-y-4">
                    <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">${stats}</div>

                    <article class="rounded-3xl border border-lime-100 bg-white p-5">
                        <p class="text-xs uppercase tracking-[0.14em] text-lime-700">最终消息</p>
                        <p class="mt-3 rounded-3xl bg-lime-50 px-4 py-4 text-sm leading-7 text-slate-800">${escapeHtml(result.final_message || "暂无最终消息")}</p>
                    </article>

                    <article class="rounded-3xl border border-stone-200 bg-white p-5">
                        <p class="text-xs uppercase tracking-[0.14em] text-stone-500">决策原因</p>
                        <p class="mt-3 text-sm leading-7 text-stone-700">${escapeHtml(result.decision_reason || "-")}</p>
                    </article>

                    ${suggestion ? `
                        <article class="rounded-3xl border border-emerald-100 bg-white p-5">
                            <div class="mb-4 flex items-center justify-between">
                                <div>
                                    <p class="text-xs uppercase tracking-[0.14em] text-emerald-700">推荐动作</p>
                                    <h3 class="mt-1 text-lg font-semibold">${escapeHtml(suggestion.recommended_action || "-")}</h3>
                                </div>
                                <span class="rounded-full bg-emerald-50 px-3 py-1 text-xs font-semibold text-emerald-700">${escapeHtml(suggestion.confidence || "-")}</span>
                            </div>
                            <p class="text-sm leading-7 text-stone-700">${escapeHtml(suggestion.action_explanation || "-")}</p>
                        </article>
                    ` : ""}

                    <article class="rounded-3xl border border-stone-200 bg-white p-5">
                        <p class="text-xs uppercase tracking-[0.14em] text-stone-500">备选消息</p>
                        <div class="mt-4 space-y-3">
                            ${secondaryMessages.length ? secondaryMessages.map(item => `
                                <div class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-4">
                                    <p class="text-xs font-semibold uppercase tracking-[0.14em] text-stone-500">${escapeHtml(item.strategy || getMessageTypeDisplayName(item.type))}</p>
                                    <p class="mt-2 text-sm leading-6 text-stone-700">${escapeHtml(item.message || "")}</p>
                                </div>
                            `).join("") : '<div class="rounded-2xl border border-dashed border-stone-300 px-4 py-8 text-center text-sm text-stone-500">暂无备选消息</div>'}
                        </div>
                    </article>

                    ${playbook.length ? `
                        <article class="rounded-3xl border border-stone-200 bg-white p-5">
                            <p class="text-xs uppercase tracking-[0.14em] text-stone-500">跟进剧本</p>
                            <div class="mt-4 space-y-3">
                                ${playbook.map(item => `
                                    <div class="rounded-2xl border border-stone-200 bg-stone-50 px-4 py-4">
                                        <p class="text-xs uppercase tracking-[0.14em] text-stone-500">适用条件</p>
                                        <p class="mt-2 text-sm text-stone-700">${escapeHtml(item.condition || "")}</p>
                                        <p class="mt-3 text-xs uppercase tracking-[0.14em] text-stone-500">建议回复</p>
                                        <p class="mt-2 text-sm leading-6 text-stone-700">${escapeHtml(item.reply || "")}</p>
                                    </div>
                                `).join("")}
                            </div>
                        </article>
                    ` : ""}
                </section>
            `;
        }

        function renderUnknownResult() {
            document.getElementById("routeSpecificContent").innerHTML = `
                <section class="rounded-3xl border border-stone-200 bg-white p-6">
                    <p class="text-xs uppercase tracking-[0.14em] text-stone-500">无法路由</p>
                    <h3 class="mt-2 text-lg font-semibold">当前输入还不足以判断要走哪条能力链</h3>
                    <p class="mt-3 text-sm leading-7 text-stone-700">
                        如果你是要搜款，请把需求写清楚，例如“帮我找几款通勤外套”。如果你是要生成跟进建议，请同时提供 guide_id、user_id 和 sku。
                    </p>
                </section>
            `;
        }

        function renderRawJson(payload) {
            document.getElementById("rawJson").textContent = JSON.stringify(payload, null, 2);
        }

        async function copyJson() {
            if (!latestPayload) {
                showError("当前还没有可复制的 JSON。");
                return;
            }

            try {
                await navigator.clipboard.writeText(JSON.stringify(latestPayload, null, 2));
            } catch (error) {
                showError("复制失败，请手动复制下方 JSON。");
            }
        }

        function makeStatCard(label, value) {
            return `
                <div class="rounded-3xl border border-stone-200 bg-white px-4 py-4">
                    <p class="text-xs uppercase tracking-[0.14em] text-stone-500">${escapeHtml(label)}</p>
                    <p class="mt-2 text-lg font-semibold text-stone-900">${escapeHtml(String(value))}</p>
                </div>
            `;
        }

        function getRouteDisplayName(routeName) {
            const map = {
                vector_search: "商品搜索",
                sales_graph: "导购跟进建议",
                unknown: "待补充信息"
            };
            return map[routeName] || routeName || "-";
        }

        function getMessageTypeDisplayName(type) {
            const map = {
                primary: "主消息",
                alternative: "备选消息"
            };
            return map[type] || type || "-";
        }

        function formatValue(value) {
            if (value === null || value === undefined) {
                return "-";
            }
            if (typeof value === "object") {
                return JSON.stringify(value);
            }
            return String(value);
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }
    </script>
</body>
</html>
