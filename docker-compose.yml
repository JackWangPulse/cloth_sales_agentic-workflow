name: cloth_sales

services:
  cloth-sales-app:
    image: ${APP_IMAGE:-jjwang0718/cloth_sales:latest}
    container_name: cloth-sales-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://cloth_user:cloth_password@mysql:3306/cloth_sales?charset=utf8mb4}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_DIR: /app/logs
      APP_ENV: ${APP_ENV:-prod}
      DEBUG: ${DEBUG:-false}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v2}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-cloth-sales}
      VISION_API_KEY: ${VISION_API_KEY:-}
      VISION_BASE_URL: ${VISION_BASE_URL:-}
      VISION_MODEL: ${VISION_MODEL:-qwen-vl-max}
      USE_MOCK_VISION: ${USE_MOCK_VISION:-false}
    volumes:
      - ./logs:/app/logs
    networks:
      - cloth_sales_net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.0
    container_name: cloth-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-cloth_sales}
      MYSQL_USER: ${MYSQL_USER:-cloth_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-cloth_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - cloth_sales_mysql_data:/var/lib/mysql
    networks:
      - cloth_sales_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: cloth-sales-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cloth_sales_redis_data:/data
    networks:
      - cloth_sales_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  cloth_sales_net:
    name: cloth_sales_net
    driver: bridge

volumes:
  cloth_sales_mysql_data:
    name: cloth_sales_mysql_data
  cloth_sales_redis_data:
    name: cloth_sales_redis_data
